services:
  postgres:
    image: postgres:17-alpine
    container_name: synod-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: synod_db
    ports:
      - "5432:5432"
    volumes:
      - synod_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: synod-redis
    ports:
      - "6379:6379"
    volumes:
      - synod_redisdata:/data

volumes:
  synod_pgdata:
  synod_redisdata:
